name: Deploy to VPS via Docker Compose

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 103.157.27.234
          username: Kelompok25 # Sesuaikan jika username VPS Anda berbeda
          password: ${{ secrets.VPS_PASSWORD }} # <--- GANTI JADI INI
          script: |
            # 1. Masuk ke folder project di VPS (Sesuaikan path-nya)
            cd /home/Kelompok25/akupeduli || git clone https://github.com/nadhiuuu/AkuPeduli.git /home/Kelompok25/akupeduli
            cd /home/Kelompok25/akupeduli
            
            # 2. Tarik kode terbaru dari GitHub
            git pull origin main
            
            # 3. Suntikkan Secret menjadi file .env (Sangat Aman)
            echo "${{ secrets.ENV_PRODUCTION }}" > .env
            
            # 4. Bangun dan nyalakan kontainer baru
            docker compose down
            docker compose up -d --build
            
            # 5. Berikan izin akses folder storage (seperti sebelumnya)
            docker exec akupeduli_app sh -c "chown -R www-data:www-data storage bootstrap/cache && chmod -R 775 storage bootstrap/cache"
            
            # 6. Bersihkan cache dan migrate
            docker exec akupeduli_app php artisan optimize:clear
            docker exec akupeduli_app php artisan migrate --force