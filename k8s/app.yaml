apiVersion: apps/v1
kind: Deployment
metadata:
  name: akupeduli-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: akupeduli
  template:
    metadata:
      labels:
        app: akupeduli
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # InitContainer bertugas meng-copy file publik (CSS/JS/Images) ke folder yang bisa dibaca Nginx
      initContainers:
      - name: copy-static
        image: ghcr.io/nadhiuuu/akupeduli-app:latest
        command: ['sh', '-c', 'cp -a /var/www/public/. /shared/']
        volumeMounts:
        - name: shared-public
          mountPath: /shared

      containers:
      # Container 1: Laravel Aplikasi
      - name: php-app
        image: ghcr.io/nadhiuuu/akupeduli-app:latest
        imagePullPolicy: Always
        env:
        - name: APP_NAME
          value: "AkuPeduli"
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "false"
        - name: APP_URL
          value: "http://103.157.27.234"
        - name: APP_KEY
          value: "base64:4lkTB8BELht3qnZ09uHYvgep+vmIph3nioeswTcxOJA="
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_HOST
          value: "db"
        - name: DB_DATABASE
          value: "akupeduli"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
              
        # --- KONFIGURASI EMAIL SMTP ---
        - name: QUEUE_CONNECTION
          value: "sync"
        - name: MAIL_MAILER
          value: "smtp"
        - name: MAIL_HOST
          value: "smtp.gmail.com"
        - name: MAIL_PORT
          value: "465"
        - name: MAIL_USERNAME
          value: "sabiteam23@gmail.com"
        - name: MAIL_PASSWORD
          value: "rrryyitumhplkrui"
        - name: MAIL_FROM_ADDRESS
          value: "sabiteam23@gmail.com"
        - name: MAIL_FROM_NAME
          value: "AkuPeduli!! - Akshara Crew"
          
        # --- KONFIGURASI GOOGLE OAUTH ---
        - name: GOOGLE_CLIENT_ID
          value: "638081033935-ad4o7qch9vislnr4nt8d9jqur17ouhl8.apps.googleusercontent.com"
        - name: GOOGLE_CLIENT_SECRET
          value: "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"
        - name: GOOGLE_REDIRECT_URI
          value: "http://103.157.27.234/auth/google/callback"
          
        # --- KONFIGURASI API LAINNYA ---
        - name: MIDTRANS_MERCHANT_ID
          value: "G031679385"
        - name: MIDTRANS_CLIENT_KEY
          value: "SB-Mid-client-MLuYAEYGBy0qPr8V"
        - name: MIDTRANS_SERVER_KEY
          value: "SB-Mid-server-a1RtO4KeFlHv9baiYjX5ihmV"
        - name: MIDTRANS_IS_PRODUCTION
          value: "false"
        - name: FONNTE_TOKEN
          value: "F4pk9ys25ZVFy2JSZond"
        ports:
        - containerPort: 9000

      # Container 2: Nginx Web Server
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: shared-public
          mountPath: /var/www/public
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf

      volumes:
      - name: shared-public
        emptyDir: {}
      - name: nginx-config-volume
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: akupeduli-service
spec:
  type: NodePort
  selector:
    app: akupeduli
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080