apiVersion: apps/v1
kind: Deployment
metadata:
  name: akupeduli-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: akupeduli
  template:
    metadata:
      labels:
        app: akupeduli
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # InitContainer bertugas meng-copy file publik (CSS/JS/Images) ke folder yang bisa dibaca Nginx
      initContainers:
      - name: copy-static
        image: ghcr.io/nadhiuuu/akupeduli-app:latest
        command: ['sh', '-c', 'cp -a /var/www/public/. /shared/']
        volumeMounts:
        - name: shared-public
          mountPath: /shared

      containers:
      # Container 1: Laravel Aplikasi
      - name: php-app
        image: ghcr.io/nadhiuuu/akupeduli-app:latest
        imagePullPolicy: Always
        env:
        - name: APP_NAME
          value: "AkuPeduli"
        - name: APP_ENV
          value: "production"
        - name: APP_DEBUG
          value: "false"
        - name: APP_URL
          value: "http://103.157.27.234"
        # Gunakan APP_KEY yang sama dengan file .env lokal Anda
        - name: APP_KEY
          value: "base64:4lkTB8BELht3qnZ09uHYvgep+vmIph3nioeswTcxOJA="
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_HOST
          value: "db"
        - name: DB_DATABASE
          value: "akupeduli"
        - name: DB_USERNAME
          value: "root"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: password
        ports:
        - containerPort: 9000

      # Container 2: Nginx Web Server
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: shared-public
          mountPath: /var/www/public
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf

      volumes:
      - name: shared-public
        emptyDir: {}
      - name: nginx-config-volume
        configMap:
          name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: akupeduli-service
spec:
  type: NodePort
  selector:
    app: akupeduli
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080