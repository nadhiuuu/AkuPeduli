services:
  app:
    build: .
    image: akupeduli-app:latest
    container_name: akupeduli_app
    restart: always
    env_file:
      - .env
    volumes:
      - shared-public:/var/www/public
      - uploaded-media:/var/www/storage/app/public
    networks:
      - laravel
    # Memastikan aplikasi menunggu DB menyala dulu
    depends_on:
      - db

  web:
    image: nginx:alpine
    container_name: akupeduli_web
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - shared-public:/var/www/public
      - uploaded-media:/var/www/public/storage
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mysql:8
    container_name: akupeduli_db
    restart: always
    environment:
      # Hanya mengatur password ROOT dan nama database saja
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - laravel

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123 # Password awal untuk login Grafana
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - laravel
    depends_on:
      - prometheus

  node_exporter:
    image: prom/node-exporter:latest
    container_name: node_exporter
    restart: always
    ports:
      - "9100:9100"
    networks:
      - laravel

networks:
  laravel:

volumes:
  shared-public:
  uploaded-media:
  dbdata:
  prometheus_data:
  grafana_data: