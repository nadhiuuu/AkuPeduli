services:
  app:
    build: .
    container_name: akupeduli_app
    volumes:
      - .:/var/www
    networks:
      - laravel

  web:
    image: nginx:alpine
    container_name: akupeduli_web
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./nginx:/etc/nginx/conf.d
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mysql:8
    container_name: akupeduli_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: AkuPeduli
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql   # 👈 WAJIB
    networks:
    - laravel

networks:
  laravel:

volumes:
  dbdata:
